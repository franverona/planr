name: CI

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'angular.json'
      - 'tsconfig*.json'
      - 'package.json'
      - 'package-lock.json'
      - 'tailwind.config.js'
      - 'postcss.config.js'
      - 'eslint.config.mjs'
      - '.prettierrc'
      - '.github/workflows/**'
  pull_request:
    paths:
      - 'src/**'
      - 'angular.json'
      - 'tsconfig*.json'
      - 'package.json'
      - 'package-lock.json'
      - 'tailwind.config.js'
      - 'postcss.config.js'
      - 'eslint.config.mjs'
      - '.prettierrc'
      - '.github/workflows/**'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NG_CLI_ANALYTICS: false

jobs:
  ci:
    name: Lint & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test -- --watch=false --browsers=ChromeHeadless

      - name: Build
        run: npm run build
