<div class="fixed inset-0 z-40 flex items-center justify-center bg-black/50 p-4">
  <div class="bg-white rounded-xl shadow-2xl w-full max-w-lg">
    <div class="flex items-center justify-between px-6 py-4 border-b border-gray-200">
      <h2 class="text-lg font-semibold text-gray-900">
        {{ project() ? 'Edit Project' : 'New Project' }}
      </h2>
      <button (click)="onCancel()" class="text-gray-400 hover:text-gray-600 transition-colors">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="h-6 w-6"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M6 18L18 6M6 6l12 12"
          />
        </svg>
      </button>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="px-6 py-5 space-y-4">
      <div>
        <label for="project-name" class="block text-sm font-medium text-gray-700 mb-1"
          >Name <span class="text-red-500">*</span></label
        >
        <input
          id="project-name"
          formControlName="name"
          type="text"
          placeholder="Project name"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent"
        />
        @if (form.get('name')?.invalid && form.get('name')?.touched) {
          <p class="mt-1 text-xs text-red-600">Name is required</p>
        }
      </div>

      <div>
        <label for="project-description" class="block text-sm font-medium text-gray-700 mb-1"
          >Description</label
        >
        <textarea
          id="project-description"
          formControlName="description"
          rows="3"
          placeholder="Brief description of the project"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent resize-none"
        ></textarea>
      </div>

      <div>
        <label for="project-status" class="block text-sm font-medium text-gray-700 mb-1"
          >Status</label
        >
        <select
          id="project-status"
          formControlName="status"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent bg-white"
        >
          <option value="active">Active</option>
          <option value="archived">Archived</option>
        </select>
      </div>

      <div class="flex justify-end gap-3 pt-2">
        <button
          type="button"
          (click)="onCancel()"
          class="px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-lg hover:bg-gray-50 transition-colors"
        >
          Cancel
        </button>
        <button
          type="submit"
          [disabled]="form.invalid"
          class="px-4 py-2 text-sm font-medium text-white bg-primary-600 rounded-lg hover:bg-primary-700 disabled:opacity-50 disabled:cursor-not-allowed transition-colors"
        >
          {{ project() ? 'Save Changes' : 'Create Project' }}
        </button>
      </div>
    </form>
  </div>
</div>
